version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_backend_data:
  postgres_ml_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  qdrant_data:
  embeddings_cache:

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    restart: unless-stopped
    logging: *default-logging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/init-topics.sh:/docker-entrypoint-initdb.d/init-topics.sh
    ports:
      - "29092:29092"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka Init (создание топиков) ─────────────────────────────────────────
  kafka_init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh
    networks:
      - app_net
    restart: "no"

  # ── PostgreSQL Backend ────────────────────────────────────────────────────
  postgres_backend:
    image: postgres:15-alpine
    container_name: postgres_backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${BACKEND_DB_NAME:-backend_db}
      POSTGRES_USER: ${BACKEND_DB_USER:-backend_user}
      POSTGRES_PASSWORD: ${BACKEND_DB_PASSWORD:-backend_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_backend_data:/var/lib/postgresql/data
      - ./postgres/backend_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND_DB_USER:-backend_user} -d ${BACKEND_DB_NAME:-backend_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ML ──────────────────────────────────────────────────────────
  postgres_ml:
    image: postgres:15-alpine
    container_name: postgres_ml
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${ML_DB_NAME:-ml_db}
      POSTGRES_USER: ${ML_DB_USER:-ml_user}
      POSTGRES_PASSWORD: ${ML_DB_PASSWORD:-ml_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_ml_data:/var/lib/postgresql/data
      - ./postgres/ml_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ML_DB_USER:-ml_user} -d ${ML_DB_NAME:-ml_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:-redis_pass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres_backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BACKEND_DB_HOST: postgres_backend
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ML_SERVICE_INTERNAL_URL: http://ml_service:8001
    volumes:
      - ../review_parser:/app/review_parser:ro
    ports:
      - "8000:8000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── ML Service (FastAPI) ───────────────────────────────────────────────────
  ml_service:
    build:
      context: ../ml_service
      dockerfile: Dockerfile
    container_name: ml_service
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres_ml:
        condition: service_healthy
      postgres_backend:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ML_DB_HOST: postgres_ml
      BACKEND_DB_HOST: postgres_backend
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_HOST: qdrant
    volumes:
      - embeddings_cache:/app/cache/embeddings
      - ../klasteristion_pipline:/app/klasteristion_pipline:ro
      - ../rag_pipline:/app/rag_pipline:ro
      - ../review_parser:/app/review_parser:ro
    ports:
      - "8001:8001"
    networks:
      - app_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (React) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: frontend
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app_net

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 3
